services:
  - type: web
    name: arcos-backend
    rootDirectory: backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 120 --bind 0.0.0.0:$PORT main:app"
    plan: free
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SETTLEMENT_MODE
        value: simulated
      - key: DB_MODE
        value: memory
      - key: USE_ML_MODEL
        value: "false"
