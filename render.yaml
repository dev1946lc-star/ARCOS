services:
  - type: web
    name: arcos-backend
    rootDirectory: backend
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 1 -k uvicorn.workers.UvicornWorker --timeout 300 --bind 0.0.0.0:$PORT main:app"
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SETTLEMENT_MODE
        value: simulated
      - key: DB_MODE
        value: memory
      - key: USE_ML_MODEL
        value: "false"
      - key: ARCOS_MAX_COMPUTE_AGENTS
        value: "4"
      - key: LOG_LEVEL
        value: "WARNING"
      - key: ARCOS_DEMAND_THRESHOLD
        value: "2.5"
